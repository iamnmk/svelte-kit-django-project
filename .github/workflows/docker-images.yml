name: Build and Security Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  issues: write

jobs:
  build-scan:
    runs-on: ubuntu-latest
    env:
      OWASP_ZAP_TARGET_URL: ${{ secrets.OWASP_ZAP_TARGET_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # OWASP Dependency Check
      # =========================
      - name: Run Dependency Check on frontend
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        with:
          project: "frontend"
          path: "./frontend"
          format: "HTML"
          out: "reports/frontend"
          args: >
            --enableRetired
            --exclude "**/.svelte-kit/**"
            --exclude "**/node_modules/**"

      - name: Run Dependency Check on backend
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        with:
          project: "backend"
          path: "./backend"
          format: "HTML"
          out: "reports/backend"
          args: >
            --enableRetired
            --enableExperimental

      - name: Upload Dependency Check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: reports/
          if-no-files-found: warn

      # =========================
      # Docker image names
      # =========================
      - name: Set lowercase image names
        run: |
          echo "IMAGE_BACKEND=ghcr.io/${GITHUB_REPOSITORY,,}-backend" >> $GITHUB_ENV
          echo "IMAGE_FRONTEND=ghcr.io/${GITHUB_REPOSITORY,,}-frontend" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # Build and push images
      # =========================
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

      # =========================
      # Trivy scans (Security tab only)
      # =========================
      - name: Run Trivy scan on backend image
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:latest
          format: sarif
          output: trivy-backend-results.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Run Trivy scan on frontend image
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_FRONTEND }}:latest
          format: sarif
          output: trivy-frontend-results.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Upload backend Trivy SARIF to Security tab
        if: always() && hashFiles('trivy-backend-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend-results.sarif
          category: trivy-backend

      - name: Upload frontend Trivy SARIF to Security tab
        if: always() && hashFiles('trivy-frontend-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend-results.sarif
          category: trivy-frontend

      # =========================
      # OWASP ZAP
      # =========================
      - name: Wait for deployment target to be reachable
        if: env.OWASP_ZAP_TARGET_URL != ''
        continue-on-error: true
        run: |
          for i in {1..18}; do
            STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" "$OWASP_ZAP_TARGET_URL")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
              echo "Target is reachable (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Target not reachable in time, continuing anyway..."

      - name: OWASP ZAP Baseline Scan
        if: env.OWASP_ZAP_TARGET_URL != ''
        uses: zaproxy/action-baseline@v0.14.0
        continue-on-error: true
        with:
          target: "${{ env.OWASP_ZAP_TARGET_URL }}"
          fail_action: false
          artifact_name: zap-report
          allow_issue_writing: false
          

