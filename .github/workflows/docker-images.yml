name: Build, Scan, and Publish Reports

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}-frontend

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create report directories
        run: |
          mkdir -p reports/backend reports/frontend

      - name: Run Dependency-Check on backend
        uses: dependency-check/Dependency-Check_Action@main
        id: depcheck_backend
        continue-on-error: true
        with:
          project: "backend"
          path: "./backend"
          format: "HTML,JSON,XML"
          out: "reports/backend"
          args: >
            --enableExperimental

      - name: Run Dependency-Check on frontend
        uses: dependency-check/Dependency-Check_Action@main
        id: depcheck_frontend
        continue-on-error: true
        with:
          project: "frontend"
          path: "./frontend"
          format: "HTML,JSON,XML"
          out: "reports/frontend"
          args: >
            --enableExperimental

      - name: Ensure at least one report artifact exists
        if: always()
        run: |
          find reports -type f | head
          if ! find reports -type f | grep -q .; then
            echo "No Dependency-Check reports were generated." > reports/README.txt
          fi

      - name: Upload Dependency-Check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: reports/
          retention-days: 30
          if-no-files-found: warn

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: dependency-check

    outputs:
      backend_image: ${{ env.IMAGE_BACKEND }}:latest
      frontend_image: ${{ env.IMAGE_FRONTEND }}:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Frontend metadata
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Create report directory
        run: mkdir -p trivy-reports

      - name: Run Trivy on backend image
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:latest
          format: sarif
          output: trivy-reports/trivy-backend.sarif
          severity: CRITICAL,HIGH
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy on frontend image
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_FRONTEND }}:latest
          format: sarif
          output: trivy-reports/trivy-frontend.sarif
          severity: CRITICAL,HIGH
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload backend SARIF
        if: always() && hashFiles('trivy-reports/trivy-backend.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-reports/trivy-backend.sarif
          category: trivy-backend

      - name: Upload frontend SARIF
        if: always() && hashFiles('trivy-reports/trivy-frontend.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-reports/trivy-frontend.sarif
          category: trivy-frontend

      - name: Upload Trivy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: trivy-reports/
          retention-days: 30
          if-no-files-found: warn

  zap-scan:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Prepare report directory
        run: mkdir -p zap-reports

      - name: Run ZAP baseline scan
        if: ${{ secrets.OWASP_ZAP_TARGET_URL != '' }}
        uses: zaproxy/action-baseline@v0.14.0
        continue-on-error: true
        with:
          target: ${{ secrets.OWASP_ZAP_TARGET_URL }}
          cmd_options: "-J zap-report.json -r zap-report.html"

      - name: Collect ZAP reports
        if: always()
        run: |
          shopt -s nullglob
          mv *.html zap-reports/ 2>/dev/null || true
          mv *.json zap-reports/ 2>/dev/null || true

          if [ -z "${{ secrets.OWASP_ZAP_TARGET_URL }}" ]; then
            echo "OWASP_ZAP_TARGET_URL secret is not set." > zap-reports/zap-skipped.txt
          fi

          if ! find zap-reports -type f | grep -q .; then
            echo "ZAP ran but no report was collected. Check target reachability." > zap-reports/zap-info.txt
          fi

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-zap-reports
          path: zap-reports/
          retention-days: 30
          if-no-files-found: warn

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs:
      - dependency-check
      - build-and-push
      - trivy-scan
      - zap-scan
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "# Security Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency-Check ran before image creation" >> $GITHUB_STEP_SUMMARY
          echo "- Docker images were built and pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy scanned the built images after push" >> $GITHUB_STEP_SUMMARY
          echo "- ZAP baseline scanned the target URL from repository secrets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts expected:" >> $GITHUB_STEP_SUMMARY
          echo "- dependency-check-reports" >> $GITHUB_STEP_SUMMARY
          echo "- trivy-reports" >> $GITHUB_STEP_SUMMARY
          echo "- owasp-zap-reports" >> $GITHUB_STEP_SUMMARY
          echo "- **owasp-zap-reports** - HTML and JSON reports" >> $GITHUB_STEP_SUMMARY

