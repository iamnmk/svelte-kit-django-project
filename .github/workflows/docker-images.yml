name: Build and push Docker images
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
  security-events: write
  issues: write 
env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}-frontend
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Backend meta
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
      - name: Frontend meta
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ============ TRIVY SCANS ============
      - name: Run Trivy vulnerability scan on backend image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:latest
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'
        env:
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scan on frontend image
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_FRONTEND }}:latest
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH'
        env:
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy backend results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'trivy-backend'

      - name: Upload Trivy frontend results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'trivy-frontend'

      # ============ DEPENDENCY-CHECK SCANS ============
      - name: Run OWASP Dependency-Check on backend
        uses: jeremylong/DependencyCheck-Action@main
        continue-on-error: true
        with:
          project: 'Backend'
          path: '.'
          format: 'All'
          args: >
            --enableExperimental
            --scan ./backend
            --out ./reports/backend

      - name: Run OWASP Dependency-Check on frontend
        uses: jeremylong/DependencyCheck-Action@main
        continue-on-error: true
        with:
          project: 'Frontend'
          path: '.'
          format: 'All'
          args: >
            --enableExperimental
            --scan ./frontend
            --out ./reports/frontend

      # ============ COLLECT AND UPLOAD DEPENDENCY-CHECK REPORTS ============
      - name: Collect Dependency-Check reports
        if: always()
        run: |
          mkdir -p final-reports
          if [ -d "reports" ]; then
            echo "Found reports directory, copying contents..."
            cp -r reports/* final-reports/ 2>/dev/null || true
          fi
          echo "=== Final Reports Directory ===" 
          find final-reports -type f -name "*" 2>/dev/null | head -20 || echo "No files found"

      - name: Upload Dependency-Check reports to artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: dependency-check-reports
          path: final-reports/
          retention-days: 30
          if-no-files-found: warn

      # ============ OWASP ZAP SCAN ============
      - name: Run OWASP ZAP scan
        continue-on-error: true
        run: |
          mkdir -p zap-reports
          
          # Check if OWASP_ZAP_TARGET_URL is set
          if [ -z "${{ secrets.OWASP_ZAP_TARGET_URL }}" ]; then
            echo "⚠️  OWASP_ZAP_TARGET_URL secret not set. Skipping ZAP scan."
            echo "To enable ZAP scanning, add OWASP_ZAP_TARGET_URL to repository secrets."
            touch zap-reports/zap-skipped.txt
          else
            echo "Starting OWASP ZAP scan on ${{ secrets.OWASP_ZAP_TARGET_URL }}..."
            
            # Pull ZAP Docker image
            docker pull ghcr.io/zaproxy/zaproxy:latest || docker pull owasp/zap2docker-stable || true
            
            # Run ZAP baseline scan
            docker run --rm \
              -v ${{ github.workspace }}/zap-reports:/zap/report:rw \
              ghcr.io/zaproxy/zaproxy:latest \
              zap-baseline.py \
              -t "${{ secrets.OWASP_ZAP_TARGET_URL }}" \
              -r /zap/report/zap-report.html \
              -J /zap/report/zap-report.json || true
            
            # Create a summary if scan ran
            if [ -f "zap-reports/zap-report.html" ]; then
              echo "✅ ZAP scan completed successfully"
            else
              echo "⚠️  ZAP scan did not produce results. Target may be unreachable."
              echo "Target: ${{ secrets.OWASP_ZAP_TARGET_URL }}" > zap-reports/zap-scan-info.txt
            fi
          fi

      - name: Upload ZAP reports to artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: owasp-zap-reports
          path: zap-reports/
          retention-days: 30
          if-no-files-found: warn

      # ============ SUMMARY ============
      - name: Create security scan summary
        if: always()
        run: |
          echo "# 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Completed Scans" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Trivy Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          if [ -f "trivy-backend-results.sarif" ]; then
            echo "- ✅ Backend image scanned" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "trivy-frontend-results.sarif" ]; then
            echo "- ✅ Frontend image scanned" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### OWASP Dependency-Check" >> $GITHUB_STEP_SUMMARY
          if [ -d "final-reports" ] && [ "$(ls -A final-reports)" ]; then
            echo "- ✅ Dependency-Check completed" >> $GITHUB_STEP_SUMMARY
            echo "  - Reports available in artifacts: **dependency-check-reports**" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️  No Dependency-Check reports generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### OWASP ZAP Scan" >> $GITHUB_STEP_SUMMARY
          if [ -f "zap-reports/zap-skipped.txt" ]; then
            echo "- ⏭️  Skipped - OWASP_ZAP_TARGET_URL not configured" >> $GITHUB_STEP_SUMMARY
          elif [ -f "zap-reports/zap-report.html" ]; then
            echo "- ✅ ZAP scan completed" >> $GITHUB_STEP_SUMMARY
            echo "  - Reports available in artifacts: **owasp-zap-reports**" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️  ZAP scan skipped or target unreachable" >> $GITHUB_STEP_SUMMARY
            echo "  - Check logs for details" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "All reports are available in the Actions artifacts section:" >> $GITHUB_STEP_SUMMARY
          echo "- **trivy-backend-results.sarif** - Uploaded to Security tab" >> $GITHUB_STEP_SUMMARY
          echo "- **trivy-frontend-results.sarif** - Uploaded to Security tab" >> $GITHUB_STEP_SUMMARY
          echo "- **dependency-check-reports** - HTML, JSON, XML, CSV reports" >> $GITHUB_STEP_SUMMARY
          echo "- **owasp-zap-reports** - HTML and JSON reports" >> $GITHUB_STEP_SUMMARY

